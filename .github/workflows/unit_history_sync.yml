name: Unit History Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "25 10 * * 1"

permissions:
  contents: write

concurrency:
  group: unit-history-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Sync Unit History into repo
        env:
          LDS_USERNAME: ${{ secrets.LDS_USERNAME }}
          LDS_PASSWORD: ${{ secrets.LDS_PASSWORD }}
          HEADLESS: "1"
          SKIP_EXISTING_FOLDERS: "0"
          OUT_DIR: "unit-history/events"
          ZIP_NAME: "unit-history/unit_history_export.zip"
          MANIFEST_PATH: "unit-history/manifest.json"
        run: |
          python scripts/unit_history_sync.py

          echo "Git changes after sync:"
          git status --short

          echo "Event folders after sync:"
          find unit-history/events -maxdepth 1 -type d | sort

          echo "Manifest after sync:"
          cat unit-history/manifest.json || true

          echo "Zip file info:"
          ls -lh unit-history/unit_history_export.zip || true

          echo "Zip contents preview:"
          unzip -l unit-history/unit_history_export.zip | head -150 || true

      - name: Build unit history index
        run: |
          python scripts/build_unit_history_index.py

          echo "Index file after build:"
          ls -lh data/unit_history_index.json || true

          echo "Index preview:"
          head -80 data/unit_history_index.json || true

          echo "Git changes after index build:"
          git status --short

      - name: Upload run artifact
        uses: actions/upload-artifact@v4
        with:
          name: unit-history-events
          path: |
            unit-history/events
            unit-history/manifest.json
            unit-history/unit_history_export.zip
            data/unit_history_index.json
          if-no-files-found: warn

      - name: Commit & push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add unit-history/events \
                  unit-history/manifest.json \
                  unit-history/unit_history_export.zip \
                  data/unit_history_index.json || true

          echo "Files staged for commit:"
          git diff --cached --name-status || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update Unit History events and index"
          git push

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-history-debug
          path: |
            debug/
            unit-history/manifest.json
            unit-history/unit_history_export.zip
            data/unit_history_index.json
          if-no-files-found: ignore
