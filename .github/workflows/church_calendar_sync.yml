name: Sync Church Calendar to Google Calendar

on:
  workflow_dispatch:
  schedule:
    - cron: "23 */6 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip curl gnupg
          wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i google-chrome-stable_current_amd64.deb || sudo apt-get -f install -y
          CHROME_VERSION=$(google-chrome --version | awk '{print $3}')
          DRIVER_URL="https://storage.googleapis.com/chrome-for-testing-public/${CHROME_VERSION}/linux64/chromedriver-linux64.zip"
          wget -O chromedriver.zip "$DRIVER_URL"
          unzip chromedriver.zip
          sudo mv chromedriver-linux64/chromedriver /usr/local/bin/chromedriver
          sudo chmod +x /usr/local/bin/chromedriver

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests selenium google-api-python-client google-auth google-auth-httplib2 google-auth-oauthlib

      - name: Run church calendar sync
        env:
          LDS_USERNAME: ${{ secrets.LDS_USERNAME }}
          LDS_PASSWORD: ${{ secrets.LDS_PASSWORD }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          CHURCH_INCLUDE_HIDDEN: "false"
          SYNC_DAYS_BACK: "14"
          SYNC_DAYS_FORWARD: "180"
          HEADLESS: "true"
        run: python church_calendar_sync.py
