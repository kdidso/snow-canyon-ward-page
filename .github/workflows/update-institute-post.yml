name: Update Weekly Institute Post

on:
  workflow_dispatch:
  schedule:
    # Runs every Sunday at 10:00 AM Mountain Time
    # 10:00 MDT = 16:00 UTC
    # 10:00 MST = 17:00 UTC (DST caveat)
    - cron: "0 16 * * 0"

permissions:
  contents: write

jobs:
  update-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright

      - name: Install Playwright browsers
        run: |
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Write Instagram storage state
        run: |
          mkdir -p data
          printf '%s' '${{ secrets.INSTAGRAM_STORAGE_STATE }}' > data/instagram_state.json

      - name: Validate Instagram storage state
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          p = Path("data/instagram_state.json")
          print("Exists:", p.exists())
          text = p.read_text(encoding="utf-8")
          print("Length:", len(text))
          print("First 120 chars:", repr(text[:120]))
          print("Last 120 chars:", repr(text[-120:]))
          json.loads(text)
          print("JSON is valid")
          PY

      - name: Run script
        run: |
          python scripts/update_weekly_institute_post.py

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: instagram-debug
          path: |
            debug_instagram_failure.png
            debug_instagram_failure.html
            debug_instagram_step1_after_goto.png
            debug_instagram_step2_after_3s.png
            debug_instagram_step3_after_8s.png
          if-no-files-found: warn

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/weekly_institute_post.json

          git diff --quiet && git diff --staged --quiet || git commit -m "Update weekly institute post"

          git push
